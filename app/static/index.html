<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apartment Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
  </head>
  <body>
    <main class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h1 class="mb-1">Apartment Expenses</h1>
          <p class="text-muted mb-0">Track spending. Settle debts. No drama.</p>
        </div>
        <div class="login-box">
          <label for="currentUser" class="form-label mb-1">Logged in as</label>
          <select id="currentUser" class="form-select"></select>
        </div>
      </div>

      <div class="row g-4">
        <section class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5 mb-3">Add Expense</h2>
              <form id="expenseForm">
                <div class="mb-3">
                  <label class="form-label" for="title">Title</label>
                  <input id="title" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="amount">Amount</label>
                  <input id="amount" class="form-control" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="category">Category</label>
                  <select id="category" class="form-select">
                    <option value="groceries">Groceries</option>
                    <option value="rent">Rent</option>
                    <option value="utilities">Utilities</option>
                    <option value="internet">Internet</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="paidBy">Paid by</label>
                  <select id="paidBy" class="form-select"></select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Split between</label>
                  <div id="splitBetween" class="split-list"></div>
                </div>
                <button class="btn btn-primary w-100" type="submit">Save Expense</button>
              </form>
            </div>
          </div>

          <div class="card shadow-sm mt-4">
            <div class="card-body">
              <h2 class="h5 mb-3">Add Recurring Bill</h2>
              <form id="billForm">
                <div class="mb-3">
                  <label class="form-label" for="billTitle">Title</label>
                  <input id="billTitle" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="billAmount">Amount</label>
                  <input id="billAmount" class="form-control" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="billCategory">Category</label>
                  <select id="billCategory" class="form-select">
                    <option value="groceries">Groceries</option>
                    <option value="rent">Rent</option>
                    <option value="utilities">Utilities</option>
                    <option value="internet">Internet</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="billDueDate">Due date</label>
                  <input id="billDueDate" class="form-control" type="date" required>
                </div>
                <button class="btn btn-outline-primary w-100" type="submit">Save Bill</button>
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-7">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 class="h5 mb-3">Ledger</h2>
              <div id="ledger" class="list-group"></div>
            </div>
          </div>

          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 class="h5 mb-3">Expenses</h2>
              <div id="expenses" class="table-responsive"></div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h5 mb-3">Recurring Bills</h2>
              <div id="bills" class="table-responsive"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
